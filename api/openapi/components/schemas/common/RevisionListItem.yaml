type: object
description: A revision summary for history lists (guide, variant, or path).
properties:
  id:
    $ref: './Uuid.yaml'
  status:
    type: string
    description: >
      Draft/submitted is the revision's own status; "approved"/"rejected"
      shown here is derived from the revision's review case.
    enum: [draft, submitted, approved, rejected]
    example: approved
  created_at:
    $ref: './Timestamp.yaml'
  approved_at:
    description: >
      When the revision was approved and promoted to live. Null unless it went
      live.
    type: [string, 'null']
    format: date-time
required: [id, status, created_at]
