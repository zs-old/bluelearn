type: object
description: Guide base joined to its canonical guide's current revision.
properties:
  id:
    $ref: '../common/Uuid.yaml'
  slug:
    type: string
    example: calculus
  title:
    type: string
    example: Calculus
  knowledge_type:
    $ref: './KnowledgeType.yaml'
  status:
    $ref: '../common/NodeStatus.yaml'
  created_at:
    $ref: '../common/Timestamp.yaml'
  updated_at:
    $ref: '../common/Timestamp.yaml'
  canonical:
    type: [object, 'null']
    description: The canonical guide and its live revision content.
    properties:
      id:
        $ref: '../common/Uuid.yaml'
      slug:
        type: [string, 'null']
        example: original
      current:
        type: [object, 'null']
        properties:
          id:
            $ref: '../common/Uuid.yaml'
          title:
            type: string
            example: Calculus
          summary:
            type: [string, 'null']
          body:
            type: [string, 'null']
          created_at:
            $ref: '../common/Timestamp.yaml'
required: [id, slug, title, knowledge_type, status]
