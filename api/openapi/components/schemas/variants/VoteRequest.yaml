type: object
description: Cast or update the caller's vote. reason is required iff direction is down.
properties:
  direction:
    type: string
    enum: [up, down]
    example: down
  reason:
    $ref: './DownvoteReason.yaml'
  note:
    type: [string, 'null']
    example: Forgot to include boiling step
required: [direction]
