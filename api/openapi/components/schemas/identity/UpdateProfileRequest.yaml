type: object
description: Partial update; at least one field required.
minProperties: 1
properties:
  username:
    type: string
    minLength: 3
    maxLength: 30
    pattern: '^[a-zA-Z0-9_-]+$'
    example: username123
  display_name:
    type: [string, 'null']
    maxLength: 50
    example: John Appleseed
  bio:
    type: [string, 'null']
    maxLength: 500
    example: Coding enthusiast
