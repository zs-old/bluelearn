type: object
description: Public-facing profile (internal id omitted).
properties:
  username:
    type: string
    example: username123
  display_name:
    type: [string, 'null']
    example: John Appleseed
  bio:
    type: [string, 'null']
    example: Coding enthusiast 
  created_at:
    $ref: '../common/Timestamp.yaml'
required: [username]
