type: object
description: >
  A path revision summary for the history list. Paths have no review gate, so a
  revision is only ever draft or published; ordering is by published_at.
properties:
  id:
    $ref: '../common/Uuid.yaml'
  title:
    type: string
    example: Backend Engineer
  change_summary:
    description: The curator's note describing what changed in this revision.
    type: [string, 'null']
  status:
    $ref: '../common/LearningPathRevisionStatus.yaml'
  created_at:
    $ref: '../common/Timestamp.yaml'
  published_at:
    description: When the revision went live. Null unless it has been published.
    type: [string, 'null']
    format: date-time
required: [id, title, status, created_at]
