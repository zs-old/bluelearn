# Reusable error responses, referenced as ../components/responses/_shared.yaml#/<Name>
# Examples are kept generic so they read correctly on every endpoint. Where a
# specific message is clearer (e.g. a 409 naming the unique field), the endpoint
# defines its own inline response instead of referencing these.
BadRequest:
  description: Validation failed
  content:
    application/json:
      schema:
        $ref: '../schemas/common/Error.yaml'
      example:
        error: Validation failed
Unauthorized:
  description: Missing or invalid auth token
  content:
    application/json:
      schema:
        $ref: '../schemas/common/Error.yaml'
      example:
        error: Unauthorized
Forbidden:
  description: Authenticated but lacking the required role (e.g. not a curator)
  content:
    application/json:
      schema:
        $ref: '../schemas/common/Error.yaml'
      example:
        error: Forbidden
NotFound:
  description: Resource not found (or not permitted; RLS reports that as zero rows)
  content:
    application/json:
      schema:
        $ref: '../schemas/common/Error.yaml'
      example:
        error: Not found
