# Path items for /variants. Referenced from ../openapi.yaml.
/variants/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  get:
    tags: [variants]
    summary: Get a variant
    description: Current revision content plus the public vote tally.
    operationId: getVariant
    responses:
      '200':
        description: The variant detail
        content:
          application/json:
            schema:
              type: object
              properties:
                variant:
                  $ref: '../components/schemas/variants/Variant.yaml'
              required: [variant]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  delete:
    tags: [variants]
    summary: Archive a variant
    operationId: archiveVariant
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The archived variant
        content:
          application/json:
            schema:
              type: object
              properties:
                variant:
                  type: object
                  properties:
                    id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    slug:
                      type: [string, 'null']
                      example: physics-based
                    status:
                      $ref: '../components/schemas/common/NodeStatus.yaml'
                  required: [id, status]
              required: [variant]
            example:
              variant:
                id: 00000000-0000-0000-0000-000000000000
                slug: physics-based
                status: archived
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/variants/{id}/vote:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  put:
    tags: [variants]
    summary: Cast or update a vote
    description: One vote per voter per guide; re-PUT updates it. reason is required on a downvote.
    operationId: castVote
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/variants/VoteRequest.yaml'
    responses:
      '200':
        description: The stored vote
        content:
          application/json:
            schema:
              type: object
              properties:
                vote:
                  $ref: '../components/schemas/variants/Vote.yaml'
              required: [vote]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  delete:
    tags: [variants]
    summary: Retract the caller's vote
    operationId: retractVote
    security:
      - bearerAuth: []
    responses:
      '204':
        description: Vote retracted
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/variants/{id}/revisions:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  get:
    tags: [variants]
    summary: Published-version history for this variant
    description: >
      The revisions that went live, newest live first. Ordered by approved_at
      (when each became the current content).
    operationId: listVariantRevisions
    responses:
      '200':
        description: Published versions, newest live first
        content:
          application/json:
            schema:
              type: object
              properties:
                revisions:
                  type: array
                  items:
                    $ref: '../components/schemas/common/RevisionListItem.yaml'
              required: [revisions]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  post:
    tags: [variants]
    summary: Start a new draft revision
    operationId: createVariantRevision
    security:
      - bearerAuth: []
    responses:
      '201':
        description: Created; draft revision id
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
              required: [revision_id]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/variants/{id}/rollback:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  post:
    tags: [variants]
    summary: Roll back to an older revision
    description: Inserts a new revision copying an older snapshot. Never destructive.
    operationId: rollbackVariant
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              revision_id:
                $ref: '../components/schemas/common/Uuid.yaml'
            required: [revision_id]
    responses:
      '201':
        description: Created; new revision id
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
              required: [revision_id]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
