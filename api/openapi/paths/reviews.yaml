# Path items for /reviews. Referenced from ../openapi.yaml.
/reviews/queue:
  get:
    tags: [reviews]
    summary: Open cases needing the caller's action
    description: Cases in the caller's pool / assigned seats.
    operationId: getReviewQueue
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Open cases
        content:
          application/json:
            schema:
              type: object
              properties:
                cases:
                  type: array
                  items:
                    $ref: '../components/schemas/reviews/ReviewCaseListItem.yaml'
              required: [cases]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'

/reviews/cases:
  get:
    tags: [reviews]
    summary: List all / past cases
    operationId: listReviewCases
    responses:
      '200':
        description: Review cases
        content:
          application/json:
            schema:
              type: object
              properties:
                cases:
                  type: array
                  items:
                    $ref: '../components/schemas/reviews/ReviewCaseListItem.yaml'
              required: [cases]

/reviews/cases/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  get:
    tags: [reviews]
    summary: Get a case with its panel and decisions
    operationId: getReviewCase
    responses:
      '200':
        description: Case + panel + decisions
        content:
          application/json:
            schema:
              type: object
              properties:
                case:
                  $ref: '../components/schemas/reviews/ReviewCase.yaml'
                panel:
                  type: array
                  items:
                    $ref: '../components/schemas/reviews/ReviewPanelMember.yaml'
                decisions:
                  type: array
                  items:
                    $ref: '../components/schemas/reviews/ReviewDecision.yaml'
              required: [case, panel, decisions]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/reviews/cases/{id}/decisions:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  post:
    tags: [reviews]
    summary: Cast a panel vote
    description: A written justification, plus rubric reasons if rejected.
    operationId: castReviewDecision
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/reviews/CreateDecisionRequest.yaml'
    responses:
      '201':
        description: The recorded decision
        content:
          application/json:
            schema:
              type: object
              properties:
                decision:
                  $ref: '../components/schemas/reviews/ReviewDecision.yaml'
              required: [decision]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
      '409':
        description: The caller's seat has already cast a decision on this case
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common/Error.yaml'
            example:
              error: You have already cast a decision on this case
