# Path items for /media. Referenced from ../openapi.yaml.
/media/upload:
  post:
    tags: [media]
    summary: Upload a file to object storage
    operationId: uploadMedia
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
            required: [file]
    responses:
      '201':
        description: The stored asset
        content:
          application/json:
            schema:
              $ref: '../components/schemas/media/MediaUploadResponse.yaml'
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
