# Path items for /path-revisions. Referenced from ../openapi.yaml.
/path-revisions/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  get:
    tags: [learning-path-revisions]
    summary: Get a revision snapshot
    description: Metadata, the revision's nodes, and the edges between them.
    operationId: getPathRevision
    responses:
      '200':
        description: The revision snapshot
        content:
          application/json:
            schema:
              type: object
              properties:
                revision:
                  $ref: '../components/schemas/learning-path-revisions/LearningPathRevision.yaml'
                nodes:
                  type: array
                  items:
                    $ref: '../components/schemas/learning-path-revisions/PathNode.yaml'
                edges:
                  type: array
                  items:
                    type: object
                    properties:
                      from_id:
                        $ref: '../components/schemas/common/Uuid.yaml'
                      to_id:
                        $ref: '../components/schemas/common/Uuid.yaml'
                    required: [from_id, to_id]
              required: [revision, nodes, edges]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  patch:
    tags: [learning-path-revisions]
    summary: Overwrite a draft revision's metadata
    description: Draft only; a published revision is immutable.
    operationId: updatePathRevision
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/learning-path-revisions/UpdatePathRevisionRequest.yaml'
    responses:
      '200':
        description: The updated revision
        content:
          application/json:
            schema:
              type: object
              properties:
                revision:
                  $ref: '../components/schemas/learning-path-revisions/LearningPathRevision.yaml'
              required: [revision]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/path-revisions/{id}/nodes/{baseId}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
    - name: baseId
      in: path
      required: true
      description: The node's guide_base_id.
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  patch:
    tags: [learning-path-revisions]
    summary: Update a node
    description: >
      Swap the chosen variant, set a note, toggle is_target, or skip /
      re-include the node (is_included). Skipping is a soft hide, not a delete.
    operationId: updatePathNode
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/learning-path-revisions/UpdateNodeRequest.yaml'
    responses:
      '200':
        description: The updated node
        content:
          application/json:
            schema:
              type: object
              properties:
                node:
                  $ref: '../components/schemas/learning-path-revisions/PathNode.yaml'
              required: [node]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/path-revisions/{id}/publish:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  post:
    tags: [learning-path-revisions]
    summary: Publish the revision
    description: Publishes the draft directly (no review gate); freezes its edges and points the path at it.
    operationId: publishPathRevision
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Published
        content:
          application/json:
            schema:
              type: object
              properties:
                slug:
                  type: string
              required: [slug]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/path-revisions/{id}/rollback:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  post:
    tags: [learning-path-revisions]
    summary: Roll back to an older revision
    description: Clones an older revision's targets/nodes into a new draft.
    operationId: rollbackPathRevision
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              revision_id:
                $ref: '../components/schemas/common/Uuid.yaml'
            required: [revision_id]
    responses:
      '201':
        description: Created; new draft revision id
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
              required: [revision_id]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/path-revisions/{id}/diff/{otherId}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
    - name: otherId
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  get:
    tags: [learning-path-revisions]
    summary: Rendered diff between two revision snapshots
    operationId: diffPathRevisions
    responses:
      '200':
        description: The rendered diff
        content:
          application/json:
            schema:
              $ref: '../components/schemas/learning-path-revisions/LearningPathRevisionDiff.yaml'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
