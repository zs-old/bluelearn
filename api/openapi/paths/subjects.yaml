# Path items for /subjects. Referenced from ../openapi.yaml.
/subjects:
  get:
    tags: [subjects]
    summary: List all subjects
    operationId: listSubjects
    responses:
      '200':
        description: All subjects
        content:
          application/json:
            schema:
              type: object
              properties:
                subjects:
                  type: array
                  items:
                    $ref: '../components/schemas/subjects/Subject.yaml'
              required: [subjects]
  post:
    tags: [subjects]
    summary: Create a subject
    operationId: createSubject
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/subjects/CreateSubjectRequest.yaml'
    responses:
      '201':
        description: The created subject
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  $ref: '../components/schemas/subjects/Subject.yaml'
              required: [subject]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '409':
        description: A subject with this name already exists
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common/Error.yaml'
            example:
              error: A subject with this name already exists

/subjects/{slug}:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: math
  get:
    tags: [subjects]
    summary: Get subject metadata
    description: Subject metadata only; the tagged guide list is a separate call.
    operationId: getSubject
    responses:
      '200':
        description: The subject
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  $ref: '../components/schemas/subjects/Subject.yaml'
              required: [subject]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/subjects/{slug}/guides:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: math
  get:
    tags: [subjects]
    summary: List guides tagged with this subject
    description: Alphabetical list of guides carrying this subject tag.
    operationId: listSubjectGuides
    responses:
      '200':
        description: Tagged guides
        content:
          application/json:
            schema:
              type: object
              properties:
                guides:
                  type: array
                  items:
                    $ref: '../components/schemas/subjects/SubjectGuideListItem.yaml'
              required: [guides]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
