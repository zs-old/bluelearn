# Path items for /prerequisites and /todos. Referenced from ../openapi.yaml.
/prerequisites:
  post:
    tags: [graph]
    summary: Add a prerequisite edge
    operationId: addPrerequisite
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              from_guide_base_id:
                $ref: '../components/schemas/common/Uuid.yaml'
              to_guide_base_id:
                $ref: '../components/schemas/common/Uuid.yaml'
            required: [from_guide_base_id, to_guide_base_id]
    responses:
      '201':
        description: The created edge
        content:
          application/json:
            schema:
              type: object
              properties:
                edge:
                  type: object
                  properties:
                    id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    from_guide_base_id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    to_guide_base_id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    edge_type:
                      type: string
                      enum: [prerequisite, related]
                      example: prerequisite
                    is_suspended:
                      type: boolean
                      example: false
                    created_at:
                      $ref: '../components/schemas/common/Timestamp.yaml'
                  required: [id, from_guide_base_id, to_guide_base_id, edge_type, is_suspended]
              required: [edge]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
      '409':
        description: That edge already exists, or it would create a prerequisite cycle
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common/Error.yaml'
            example:
              error: That prerequisite edge would create a cycle

/prerequisites/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: '../components/schemas/common/Uuid.yaml'
  delete:
    tags: [graph]
    summary: Suspend a prerequisite edge
    description: Soft-removes the edge from graph traversal by setting is_suspended; the row is kept so it can be restored.
    operationId: suspendPrerequisite
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The suspended edge
        content:
          application/json:
            schema:
              type: object
              properties:
                edge:
                  type: object
                  properties:
                    id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    from_guide_base_id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    to_guide_base_id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    edge_type:
                      type: string
                      enum: [prerequisite, related]
                      example: prerequisite
                    is_suspended:
                      type: boolean
                      example: true
                    created_at:
                      $ref: '../components/schemas/common/Timestamp.yaml'
                  required: [id, from_guide_base_id, to_guide_base_id, edge_type, is_suspended]
              required: [edge]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/todos:
  get:
    tags: [graph]
    summary: List open TODO prerequisites
    description: All open TODO prerequisites declared across guides.
    operationId: listTodos
    responses:
      '200':
        description: Open TODO prerequisites
        content:
          application/json:
            schema:
              type: object
              properties:
                todos:
                  type: array
                  items:
                    $ref: '../components/schemas/guides/TodoBoardItem.yaml'
              required: [todos]
  post:
    tags: [graph]
    summary: Declare a TODO prerequisite
    description: >
      Declares a missing prerequisite topic for a guide that has no guide base
      yet. Addressed by the dependent guide's id, not slug, since this is
      declared while authoring (drafts have no slug). Surfaces on the public
      board once the dependent guide is published.
    operationId: declareTodo
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              guide_base_id:
                description: The dependent guide that declares the need.
                $ref: '../components/schemas/common/Uuid.yaml'
              title:
                type: string
                example: Trigonometry
            required: [guide_base_id, title]
    responses:
      '201':
        description: The created TODO prerequisite
        content:
          application/json:
            schema:
              type: object
              properties:
                todo:
                  $ref: '../components/schemas/guides/Todo.yaml'
              required: [todo]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
