# Path items for /paths. Referenced from ../openapi.yaml.
/paths:
  get:
    tags: [learning-paths]
    summary: List published learning paths
    operationId: listLearningPaths
    responses:
      '200':
        description: Published learning paths
        content:
          application/json:
            schema:
              type: object
              properties:
                learning_paths:
                  type: array
                  items:
                    $ref: '../components/schemas/learning-paths/LearningPathListItem.yaml'
              required: [learning_paths]
  post:
    tags: [learning-paths]
    summary: Create a draft path
    description: >
      Creates the shell + revision 1, seeding the closure of the target
      guides as the initial node set. Returns the draft revision id for routing
      to the editor.
    operationId: createLearningPath
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/learning-paths/CreateLearningPathRequest.yaml'
    responses:
      '201':
        description: Created; draft revision id
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
              required: [revision_id]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'

/paths/{slug}:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: backend-engineer
  get:
    tags: [learning-paths]
    summary: Open a path
    description: Resolves the live current revision and returns its full snapshot.
    operationId: getLearningPath
    responses:
      '200':
        description: The path + its current snapshot
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  $ref: '../components/schemas/learning-paths/LearningPath.yaml'
                snapshot:
                  $ref: '../components/schemas/learning-paths/PathSnapshot.yaml'
              required: [path, snapshot]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  delete:
    tags: [learning-paths]
    summary: Archive a path
    operationId: archiveLearningPath
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The archived path
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: object
                  properties:
                    id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    slug:
                      type: string
                      example: backend-engineer
                    status:
                      $ref: '../components/schemas/common/NodeStatus.yaml'
                  required: [id, slug, status]
              required: [path]
            example:
              path:
                id: 00000000-0000-0000-0000-000000000000
                slug: backend-engineer
                status: archived
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/paths/{slug}/revisions:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: backend-engineer
  get:
    tags: [learning-paths]
    summary: Revision history for this path
    operationId: listLearningPathRevisions
    responses:
      '200':
        description: Revisions, newest first
        content:
          application/json:
            schema:
              type: object
              properties:
                revisions:
                  type: array
                  items:
                    $ref: '../components/schemas/learning-path-revisions/LearningPathRevisionListItem.yaml'
              required: [revisions]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  post:
    tags: [learning-paths]
    summary: Start a new draft revision
    operationId: createLearningPathRevision
    security:
      - bearerAuth: []
    responses:
      '201':
        description: Created; draft revision id
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
              required: [revision_id]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/_shared.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
