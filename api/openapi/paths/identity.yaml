# Path items for /me and /profiles. Referenced from ../openapi.yaml.
/me:
  get:
    tags: [identity]
    summary: Own profile + roles
    operationId: getMe
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The caller's profile and roles
        content:
          application/json:
            schema:
              $ref: '../components/schemas/identity/MeResponse.yaml'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  patch:
    tags: [identity]
    summary: Update own profile
    description: Partial update of the grant-writable columns (username, display_name, bio).
    operationId: updateMe
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/identity/UpdateProfileRequest.yaml'
    responses:
      '200':
        description: The updated profile and roles
        content:
          application/json:
            schema:
              $ref: '../components/schemas/identity/MeResponse.yaml'
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '409':
        description: Username already taken
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common/Error.yaml'
            example:
              error: Username already taken

/me/drafts:
  get:
    tags: [identity]
    summary: The caller's in-progress drafts
    description: >
      The caller's draft revisions for a "continue editing" view, guide drafts
      and path drafts as separate lists, each most-recently-edited first. RLS
      already scopes drafts to their author.
    operationId: getMyDrafts
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The caller's guide and path draft revisions
        content:
          application/json:
            schema:
              type: object
              properties:
                guide_drafts:
                  type: array
                  items:
                    $ref: '../components/schemas/identity/GuideDraft.yaml'
                path_drafts:
                  type: array
                  items:
                    $ref: '../components/schemas/identity/PathDraft.yaml'
              required: [guide_drafts, path_drafts]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'

/profiles/{username}:
  get:
    tags: [identity]
    summary: Public profile by username
    description: Public profile + public role badges (admin excluded). Suspended members 404.
    operationId: getProfile
    parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
        example: username123
    responses:
      '200':
        description: The public profile and role badges
        content:
          application/json:
            schema:
              $ref: '../components/schemas/identity/ProfileResponse.yaml'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
